name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy scraper files to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            main.py scraper.py requirements.txt \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/Luki-Play-OTT/scraper/

      - name: Restart scraper on EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/Luki-Play-OTT/scraper
            .venv/bin/pip install -r requirements.txt --quiet
            pm2 restart luki-scraper --update-env
            echo "Deploy luki-scraper OK"
          ENDSSH
