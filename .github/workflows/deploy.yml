name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            # ── Clonar o actualizar repo ────────────────────────────────
            if [ ! -d ~/descargatrantor ]; then
              git clone https://github.com/mlogacho/descargatrantor.git ~/descargatrantor
            else
              cd ~/descargatrantor && git pull
            fi

            cd ~/descargatrantor

            # ── Python deps ────────────────────────────────────────────
            pip3 install -r requirements.txt --quiet

            # ── Playwright Chromium ────────────────────────────────────
            python3 -m playwright install chromium --with-deps

            # ── PM2: iniciar o recargar ────────────────────────────────
            if pm2 list | grep -q "descargatrantor"; then
              pm2 reload descargatrantor
            else
              pm2 start "uvicorn main:app --host 0.0.0.0 --port 8001" \
                --name descargatrantor \
                --interpreter python3
              pm2 save
            fi

            echo "Deploy descargatrantor OK"
          ENDSSH
